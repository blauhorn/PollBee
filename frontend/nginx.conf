server {
    listen 8100;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /pollapp-dev {
        return 301 /pollapp-dev/;
    }

    location /pollapp-dev/ {
        rewrite ^/pollapp-dev/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
